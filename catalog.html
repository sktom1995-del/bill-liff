<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>สินค้าร้านลูกชิ้นมนต์ชัย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Sarabun',sans-serif; background:#f0f2f5; color:#333; padding-bottom:70px; }

  .header {
    background:#00B900; color:#fff; padding:14px; text-align:center;
    position:sticky; top:0; z-index:20;
  }
  .header h1 { font-size:17px; font-weight:700; }
  .cart-btn {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:#fff; color:#00B900; border:none; border-radius:20px;
    padding:6px 12px; font-size:13px; font-weight:700;
    font-family:'Sarabun',sans-serif; cursor:pointer;
  }
  .cart-btn:active { background:#eee; }

  .tabs {
    display:flex; gap:6px; padding:10px 12px; overflow-x:auto;
    background:#fff; position:sticky; top:52px; z-index:15;
    border-bottom:1px solid #eee; -webkit-overflow-scrolling:touch;
  }
  .tabs::-webkit-scrollbar { display:none; }
  .tab {
    background:#f0f0f0; color:#777; font-size:13px; padding:6px 14px;
    border-radius:20px; white-space:nowrap; cursor:pointer; border:none;
    font-family:'Sarabun',sans-serif;
  }
  .tab.active { background:#00B900; color:#fff; font-weight:600; }

  .wrap { padding:12px; max-width:600px; margin:0 auto; }

  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .card {
    background:#fff; border-radius:10px; overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
  }
  .card.picked { outline:2px solid #00B900; }
  .card-img {
    width:100%; height:110px; object-fit:cover; background:#f5f5f5; display:block;
  }
  .card-body { padding:8px; }
  .card-name { font-size:13px; line-height:1.3; margin-bottom:3px; min-height:34px; }
  .card-price { font-size:15px; font-weight:700; color:#00B900; margin-bottom:8px; }

  .qty-row { display:flex; align-items:center; gap:5px; }
  .qty-btn {
    width:28px; height:28px; border:1px solid #ddd; background:#fff; border-radius:6px;
    font-size:16px; color:#666; cursor:pointer; font-family:'Sarabun',sans-serif;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .qty-btn:active { background:#f0f0f0; }
  .qty-input {
    flex:1; min-width:0; height:28px; text-align:center; border:1px solid #ddd;
    border-radius:6px; font-size:14px; font-family:'Sarabun',sans-serif; color:#333;
  }
  .qty-input:focus { outline:none; border-color:#00B900; }

  /* ตะกร้า */
  .sheet-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
    z-index:100; align-items:flex-end;
  }
  .sheet-overlay.show { display:flex; }
  .sheet {
    width:100%; max-width:600px; margin:0 auto; background:#fff;
    border-radius:18px 18px 0 0; padding:16px; max-height:80vh; overflow-y:auto;
    animation:slideUp .2s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
  .sheet-handle { width:36px; height:4px; background:#ddd; border-radius:2px; margin:0 auto 12px; }
  .sheet-title { font-size:16px; font-weight:700; margin-bottom:12px; }

  .cart-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 0; border-top:1px solid #f2f2f2; font-size:14px;
  }
  .cart-row .name { flex:1; }
  .cart-row .price { color:#888; margin-left:8px; }
  .cart-del {
    background:none; border:none; color:#e53935; font-size:18px; cursor:pointer;
    padding:0 0 0 10px; font-family:'Sarabun',sans-serif;
  }

  .total-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 0 14px; border-top:2px solid #00B900; margin-top:6px;
  }
  .total-row .lbl { font-size:15px; font-weight:600; }
  .total-row .val { font-size:20px; font-weight:700; color:#00B900; }

  .copy-box {
    background:#f7f7f7; border-radius:8px; padding:11px; margin-bottom:12px;
    font-family:monospace; font-size:13px; color:#555; line-height:1.8;
    white-space:pre-wrap; word-break:break-word;
  }
  .btn-copy {
    width:100%; padding:13px; background:#00B900; color:#fff; border:none;
    border-radius:10px; font-size:16px; font-weight:700;
    font-family:'Sarabun',sans-serif; cursor:pointer;
  }
  .btn-copy:active { background:#009900; }
  .copy-hint { font-size:11px; color:#aaa; text-align:center; margin-top:8px; }

  .empty { text-align:center; color:#aaa; padding:40px 0; font-size:14px; }
  .loading { text-align:center; color:#888; padding:40px 0; font-size:14px; }
</style>
</head>
<body>

<div class="header">
  <h1>🛒 สินค้าร้านลูกชิ้นมนต์ชัย</h1>
  <button class="cart-btn" onclick="openCart()">🛍️ <span id="cartCount">0</span></button>
</div>

<div class="tabs" id="tabs"></div>

<div class="wrap">
  <div id="grid"><div class="loading">กำลังโหลดสินค้า...</div></div>
</div>

<!-- ตะกร้า -->
<div class="sheet-overlay" id="cartOverlay" onclick="if(event.target===this)closeCart()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">รายการที่เลือก</div>
    <div id="cartList"></div>
  </div>
</div>

<script>
const GAS_URL = 'ใส่_GAS_URL_ตรงนี้';

let allProducts = [];
let categories  = [];
let currentCat  = 'ทั้งหมด';
let cart        = {};   // { "ชื่อสินค้า": จำนวน }

// ==================== INIT ====================
async function init() {
  try {
    const res = await fetch(GAS_URL + '?action=getCatalog');
    const data = await res.json();
    allProducts = data.products || [];
    categories  = data.categories || [];
    renderTabs();
    renderGrid();
  } catch (e) {
    document.getElementById('grid').innerHTML = '<div class="empty">โหลดสินค้าไม่ได้</div>';
  }
}

// ==================== แท็บหมวดหมู่ ====================
function renderTabs() {
  const el = document.getElementById('tabs');
  const list = ['ทั้งหมด'].concat(categories);
  el.innerHTML = list.map(function(c){
    const active = (c === currentCat) ? ' active' : '';
    return '<button class="tab' + active + '" onclick="selectCat(\'' + c.replace(/'/g,"\\'") + '\')">' + c + '</button>';
  }).join('');
}

function selectCat(cat) {
  currentCat = cat;
  renderTabs();
  renderGrid();
  window.scrollTo(0, 0);
}

// ==================== ตารางสินค้า ====================
function renderGrid() {
  const el = document.getElementById('grid');
  const list = (currentCat === 'ทั้งหมด')
    ? allProducts
    : allProducts.filter(function(p){ return p.category === currentCat; });

  if (list.length === 0) {
    el.innerHTML = '<div class="empty">ไม่มีสินค้าในหมวดนี้</div>';
    return;
  }

  el.innerHTML = '<div class="grid">' + list.map(function(p){
    const qty = cart[p.name] || 0;
    const picked = qty > 0 ? ' picked' : '';
    const safeName = p.name.replace(/'/g, "\\'");
    const img = p.imgUrl
      ? '<img class="card-img" src="' + p.imgUrl + '" alt="' + p.name + '" loading="lazy">'
      : '<div class="card-img"></div>';
    return '<div class="card' + picked + '">' +
      img +
      '<div class="card-body">' +
        '<div class="card-name">' + p.name + '</div>' +
        '<div class="card-price">' + p.price + ' บ.</div>' +
        '<div class="qty-row">' +
          '<button class="qty-btn" onclick="changeQty(\'' + safeName + '\', -1)">−</button>' +
          '<input class="qty-input" type="number" min="0" value="' + qty + '" ' +
            'onchange="setQty(\'' + safeName + '\', this.value)" ' +
            'onfocus="this.select()">' +
          '<button class="qty-btn" onclick="changeQty(\'' + safeName + '\', 1)">+</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('') + '</div>';
}

// ==================== จัดการจำนวน ====================
function changeQty(name, delta) {
  const cur = cart[name] || 0;
  const next = Math.max(0, cur + delta);
  if (next === 0) delete cart[name];
  else cart[name] = next;
  updateCartCount();
  renderGrid();
}

function setQty(name, val) {
  const n = Math.max(0, parseInt(val) || 0);
  if (n === 0) delete cart[name];
  else cart[name] = n;
  updateCartCount();
  renderGrid();
}

function updateCartCount() {
  const count = Object.keys(cart).length;
  document.getElementById('cartCount').textContent = count;
}

// ==================== ตะกร้า ====================
function openCart() {
  renderCart();
  document.getElementById('cartOverlay').classList.add('show');
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('show');
}

function renderCart() {
  const el = document.getElementById('cartList');
  const names = Object.keys(cart);

  if (names.length === 0) {
    el.innerHTML = '<div class="empty">ยังไม่ได้เลือกสินค้า</div>';
    return;
  }

  let total = 0;
  let rows = '';
  let copyText = '';

  names.forEach(function(name){
    const qty = cart[name];
    const p = allProducts.find(function(x){ return x.name === name; });
    const price = p ? p.price : 0;
    const sum = price * qty;
    total += sum;

    rows += '<div class="cart-row">' +
      '<span class="name">' + name + ' × ' + qty + '</span>' +
      '<span class="price">' + sum.toLocaleString() + ' บ.</span>' +
      '<button class="cart-del" onclick="removeItem(\'' + name.replace(/'/g,"\\'") + '\')">✕</button>' +
    '</div>';

    copyText += name + ' ' + qty + '\n';
  });

  el.innerHTML =
    rows +
    '<div class="total-row"><span class="lbl">รวม</span>' +
    '<span class="val">' + total.toLocaleString() + ' บ.</span></div>' +
    '<div class="copy-box" id="copyBox">' + copyText.trim() + '</div>' +
    '<button class="btn-copy" onclick="copyList()">📋 คัดลอกรายการ</button>' +
    '<div class="copy-hint">คัดลอกแล้วส่งให้ร้านทางไลน์ เพื่อเช็คของก่อนสั่ง</div>';
}

function removeItem(name) {
  delete cart[name];
  updateCartCount();
  renderCart();
  renderGrid();
}

function copyList() {
  const text = document.getElementById('copyBox').textContent;
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  alert('✅ คัดลอกแล้ว!\nส่งให้ร้านทางไลน์ได้เลยครับ');
}

init();
</script>
</body>
</html>
