<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>บันทึกบิลสินค้า</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f5f5f5; color: #333; }

    .header { background: #00B900; color: white; padding: 14px 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,185,0,0.3); }
    .header h1 { font-size: 18px; font-weight: 700; }

    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 12px; color: #888; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #00B900; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #app { display: none; padding: 12px; max-width: 480px; margin: 0 auto; }

    .card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    .input-field { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 15px; font-family: 'Sarabun', sans-serif; transition: border-color 0.2s; }
    .input-field:focus { outline: none; border-color: #00B900; }

    /* TABS */
    .category-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; flex-wrap: wrap; }
    .category-scroll::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1.5px solid #e0e0e0; background: white; font-size: 13px; font-family: 'Sarabun', sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; color: #555; }
    .cat-btn.active { background: #00B900; border-color: #00B900; color: white; font-weight: 600; }

    /* SUB TABS */
    .sub-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
    .sub-scroll::-webkit-scrollbar { display: none; }
    .sub-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 16px; border: 1.5px solid #e0e0e0; background: white; font-size: 12px; font-family: 'Sarabun', sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; color: #666; }
    .sub-btn.active { background: #333; border-color: #333; color: white; font-weight: 600; }
    .sub-label { font-size: 11px; color: #aaa; margin-bottom: 6px; }

    /* PRODUCT LIST */
    #productList { display: flex; flex-direction: column; gap: 8px; }
    .product-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1.5px solid #e8e8e8; border-radius: 10px; transition: all 0.2s; background: white; }
    .product-item.selected { border-color: #00B900; background: #f0fff0; }
    .product-check { width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; cursor: pointer; }
    .product-item.selected .product-check { background: #00B900; border-color: #00B900; }
    .product-check::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; display: none; }
    .product-item.selected .product-check::after { display: block; }
    .product-name { flex: 1; font-size: 14px; font-weight: 600; color: #333; }
    .product-price { font-size: 12px; color: #888; }
    .product-controls { display: flex; align-items: center; gap: 6px; }
    .qty-input { width: 50px; padding: 5px; border: 1.5px solid #e0e0e0; border-radius: 6px; font-size: 14px; text-align: center; font-family: 'Sarabun', sans-serif; }
    .unit-select { padding: 5px 4px; border: 1.5px solid #e0e0e0; border-radius: 6px; font-size: 13px; font-family: 'Sarabun', sans-serif; background: white; }

    #selectedSummary { display: none; }
    .summary-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .summary-item:last-child { border-bottom: none; }
    .summary-name { color: #333; flex: 1; }
    .summary-calc { color: #888; font-size: 12px; margin: 0 8px; }
    .summary-total { font-weight: 700; color: #00B900; }

    .grand-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 4px; }
    .grand-total-label { font-size: 16px; font-weight: 700; color: #333; }
    .grand-total-amount { font-size: 22px; font-weight: 700; color: #00B900; }

    .submit-btn { width: 100%; padding: 14px; background: #00B900; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: 'Sarabun', sans-serif; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
    .submit-btn:active { background: #009900; transform: scale(0.98); }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    .empty-state { text-align: center; padding: 24px; color: #aaa; font-size: 14px; }
    .badge { background: #00B900; color: white; border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700; margin-left: 4px; }
  </style>
</head>
<body>

<div class="header">
  <h1>🧾 บันทึกบิลสินค้า</h1>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div>กำลังโหลดข้อมูล...</div>
</div>

<div id="app">
  <!-- ชื่อลูกค้า -->
  <div class="card">
    <div class="card-title">ชื่อลูกค้า</div>
    <input type="text" id="customerName" class="input-field" placeholder="พิมพ์ชื่อลูกค้า...">
  </div>

  <!-- ประเภท + บริษัท -->
  <div class="card">
    <div class="card-title">ประเภทสินค้า</div>
    <div class="category-scroll" id="typeTabs"></div>
    <div id="companyWrapper" style="display:none">
      <div class="sub-label">บริษัท</div>
      <div class="sub-scroll" id="companyTabs"></div>
    </div>
  </div>

  <!-- รายการสินค้า -->
  <div class="card">
    <div class="card-title" id="productListTitle">รายการสินค้า</div>
    <div id="productList"></div>
  </div>

  <!-- สรุปรายการที่เลือก -->
  <div class="card" id="selectedSummary">
    <div class="card-title">รายการที่เลือก <span class="badge" id="selectedCount">0</span></div>
    <div id="summaryItems"></div>
    <div class="grand-total">
      <div class="grand-total-label">ยอดรวม</div>
      <div class="grand-total-amount" id="grandTotal">0 บาท</div>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitOrder()">
    ✅ ตรวจสอบและส่ง
  </button>
</div>

<script>
const LIFF_ID = '2010175558-26n1GZ4C';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyphDzpsnZSkXrVUgn0uJjYJjHiXNm7M-Xh4r40jMyOJakjcOOvOHq5WJkSlxegAImV/exec';

let allProducts   = [];
let selectedItems = {};
let currentType   = ''; // ประเภท (คอลัมน์ I)
let currentCo     = ''; // บริษัท (คอลัมน์ H)
let userProfile   = null;

// ==================== INIT ====================
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      userProfile = await liff.getProfile();
    } else {
      liff.login();
      return;
    }
    await loadProducts();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch (err) {
    document.getElementById('loading').innerHTML = `<div>❌ โหลดไม่ได้: ${err.message}</div>`;
  }
}

// ==================== LOAD PRODUCTS ====================
async function loadProducts() {
  const res = await fetch(`${GAS_URL}?action=getProducts`);
  allProducts = await res.json();

  // ดึงประเภท (subCategory = คอลัมน์ I)
  const types = [...new Set(allProducts.map(p => p.subCategory).filter(Boolean))];
  currentType = types[0] || '';
  currentCo   = '';

  const tabsEl = document.getElementById('typeTabs');
  tabsEl.innerHTML = '';
  types.forEach(type => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (type === currentType ? ' active' : '');
    btn.textContent = type;
    btn.onclick = () => selectType(type);
    tabsEl.appendChild(btn);
  });

  renderCompanyTabs();
  renderProducts();
}

// ==================== SELECT TYPE ====================
function selectType(type) {
  currentType = type;
  currentCo   = '';
  document.querySelectorAll('#typeTabs .cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === type);
  });
  renderCompanyTabs();
  renderProducts();
}

// ==================== RENDER COMPANY TABS ====================
function renderCompanyTabs() {
  const companies = [...new Set(
    allProducts
      .filter(p => p.subCategory === currentType)
      .map(p => p.category)
      .filter(Boolean)
  )];

  const wrapper = document.getElementById('companyWrapper');
  const tabsEl  = document.getElementById('companyTabs');
  tabsEl.innerHTML = '';

  if (companies.length <= 1) {
    currentCo = companies[0] || '';
    wrapper.style.display = 'none';
    return;
  }

  wrapper.style.display = 'block';

  // ปุ่ม "ทั้งหมด"
  const allBtn = document.createElement('button');
  allBtn.className = 'sub-btn' + (!currentCo ? ' active' : '');
  allBtn.textContent = 'ทั้งหมด';
  allBtn.onclick = () => selectCompany('');
  tabsEl.appendChild(allBtn);

  companies.forEach(co => {
    const label = co.replace('บริษัท ', '');
    const btn = document.createElement('button');
    btn.className = 'sub-btn' + (co === currentCo ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => selectCompany(co);
    tabsEl.appendChild(btn);
  });
}

// ==================== SELECT COMPANY ====================
function selectCompany(co) {
  currentCo = co;
  document.querySelectorAll('#companyTabs .sub-btn').forEach(b => {
    const isCo = co ? b.textContent === co.replace('บริษัท ', '') : b.textContent === 'ทั้งหมด';
    b.classList.toggle('active', isCo);
  });
  renderProducts();
}

// ==================== RENDER PRODUCTS ====================
function renderProducts() {
  const list = document.getElementById('productList');

  let filtered = allProducts.filter(p => p.subCategory === currentType);
  if (currentCo) filtered = filtered.filter(p => p.category === currentCo);

  const title = currentCo
    ? `${currentType} › ${currentCo.replace('บริษัท ', '')}`
    : currentType;
  document.getElementById('productListTitle').textContent = `รายการสินค้า — ${title}`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">ไม่มีสินค้าในหมวดนี้</div>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(p => {
    const idx = allProducts.indexOf(p);
    const sel = selectedItems[idx];
    const div = document.createElement('div');
    div.className = 'product-item' + (sel ? ' selected' : '');
    div.id = `prod-${idx}`;

    const units = ['ถุง'];
    if (p.bagPerHiw) units.push('หิ้ว');
    if (p.kgPerBag)  units.push('โล');
    const unitOpts = units.map(u =>
      `<option value="${u}" ${sel && sel.unit === u ? 'selected' : ''}>${u}</option>`
    ).join('');

    div.innerHTML = `
      <div class="product-check" onclick="toggleProduct(${idx})"></div>
      <div style="flex:1" onclick="toggleProduct(${idx})">
        <div class="product-name">${p.name.split('หรือ')[0].trim()}</div>
        <div class="product-price">${p.price} บ./ถุง${p.bulkPrice ? ` | ส่ง ${p.bulkPrice} บ. (≥${p.minQty})` : ''}</div>
      </div>
      <div class="product-controls" style="${sel ? '' : 'opacity:0.3;pointer-events:none'}">
        <input type="number" class="qty-input" id="qty-${idx}" value="${sel ? sel.qty : 1}" min="1"
          oninput="updateQty(${idx})" onclick="event.stopPropagation()">
        <select class="unit-select" id="unit-${idx}" onchange="updateUnit(${idx})" onclick="event.stopPropagation()">
          ${unitOpts}
        </select>
      </div>
    `;
    list.appendChild(div);
  });
}

// ==================== TOGGLE / UPDATE ====================
function toggleProduct(idx) {
  if (selectedItems[idx]) {
    delete selectedItems[idx];
  } else {
    selectedItems[idx] = { qty: 1, unit: 'ถุง' };
  }
  renderProducts();
  updateSummary();
}

function updateQty(idx) {
  const qty = parseFloat(document.getElementById(`qty-${idx}`).value) || 1;
  if (selectedItems[idx]) selectedItems[idx].qty = qty;
  updateSummary();
}

function updateUnit(idx) {
  const unit = document.getElementById(`unit-${idx}`).value;
  if (selectedItems[idx]) selectedItems[idx].unit = unit;
  updateSummary();
}

// ==================== SUMMARY ====================
function updateSummary() {
  const summaryEl = document.getElementById('selectedSummary');
  const itemsEl   = document.getElementById('summaryItems');
  const countEl   = document.getElementById('selectedCount');
  const totalEl   = document.getElementById('grandTotal');
  const keys      = Object.keys(selectedItems);

  if (keys.length === 0) { summaryEl.style.display = 'none'; return; }

  summaryEl.style.display = 'block';
  countEl.textContent = keys.length;

  let grandTotal = 0;
  itemsEl.innerHTML = '';

  keys.forEach(idx => {
    const p   = allProducts[idx];
    const sel = selectedItems[idx];
    const { pricePerBag, itemTotal } = calcPrice(p, sel.qty, sel.unit);
    grandTotal += itemTotal;

    const row = document.createElement('div');
    row.className = 'summary-item';
    row.innerHTML = `
      <div class="summary-name">${p.name.split('หรือ')[0].trim()}</div>
      <div class="summary-calc">${sel.qty}${sel.unit} × ${pricePerBag}บ.</div>
      <div class="summary-total">${itemTotal} บ.</div>
    `;
    itemsEl.appendChild(row);
  });

  totalEl.textContent = `${grandTotal} บาท`;
}

// ==================== CALC PRICE ====================
function calcPrice(p, qty, unit) {
  let totalBags = qty;
  if (unit === 'หิ้ว' && p.bagPerHiw) totalBags = qty * p.bagPerHiw;
  if (unit === 'โล'   && p.kgPerBag)  totalBags = qty / p.kgPerBag;

  const isBulk      = p.minQty && p.bulkPrice && totalBags >= p.minQty;
  const pricePerBag = isBulk ? p.bulkPrice : p.price;
  const itemTotal   = pricePerBag * totalBags;

  return { totalBags, pricePerBag, itemTotal };
}

// ==================== SUBMIT ====================
async function submitOrder() {
  const customerName = document.getElementById('customerName').value.trim();
  if (!customerName) { alert('กรุณาใส่ชื่อลูกค้าก่อนครับ'); return; }

  const keys = Object.keys(selectedItems);
  if (keys.length === 0) { alert('กรุณาเลือกสินค้าอย่างน้อย 1 รายการ'); return; }

  const items = keys.map(idx => {
    const p   = allProducts[idx];
    const sel = selectedItems[idx];
    return { name: p.name.split('หรือ')[0].trim(), qty: sel.qty, unit: sel.unit };
  });

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = '⏳ กำลังส่ง...';

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'submitOrder', userId: userProfile.userId, customerName, items })
    });
    alert('✅ ส่งรายการเรียบร้อยแล้ว!\nกรุณาตรวจสอบใน LINE');
    liff.closeWindow();
  } catch (err) {
    alert('❌ ส่งข้อมูลไม่ได้: ' + err.message);
  }

  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = '✅ ตรวจสอบและส่ง';
}

init();
</script>
</body>
</html>
