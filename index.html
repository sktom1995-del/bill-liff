<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ลูกชิ้นมนต์ชัย</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f5f5f5; color: #333; }

    .header {
      background: #00B900; color: white; padding: 14px 16px;
      text-align: center; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,185,0,0.3);
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    /* TABS */
    .tabs { display: flex; background: white; border-bottom: 2px solid #e0e0e0; position: sticky; top: 58px; z-index: 99; }
    .tab  { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; color: #888; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
    .tab.active { color: #00B900; border-bottom-color: #00B900; }

    /* SEARCH PAGE */
    .page { display: none; padding: 12px; }
    .page.active { display: block; }

    .search-box { position: relative; margin-bottom: 12px; }
    .search-box input {
      width: 100%; padding: 10px 16px 10px 40px;
      border: 2px solid #e0e0e0; border-radius: 20px;
      font-size: 15px; font-family: 'Sarabun', sans-serif;
      outline: none; transition: border 0.2s;
    }
    .search-box input:focus { border-color: #00B900; }
    .search-box .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 16px; }

    .cat-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 10px; }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-btn {
      white-space: nowrap; padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid #e0e0e0; background: white; font-family: 'Sarabun', sans-serif;
      font-size: 13px; cursor: pointer; transition: all 0.2s; color: #555;
    }
    .cat-btn.active { background: #00B900; color: white; border-color: #00B900; }

    .product-list { display: flex; flex-direction: column; gap: 8px; }
    .product-item {
      background: white; border-radius: 10px; padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .product-item.selected { border: 2px solid #00B900; }
    .prod-name { flex: 1; font-size: 14px; font-weight: 600; }
    .prod-price { font-size: 12px; color: #888; }
    .qty-controls { display: flex; align-items: center; gap: 6px; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: #f0f0f0; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #333;
    }
    .qty-btn.plus { background: #00B900; color: white; }
    .qty-input {
      width: 40px; text-align: center; border: 1.5px solid #e0e0e0;
      border-radius: 6px; padding: 4px; font-size: 14px;
      font-family: 'Sarabun', sans-serif;
    }
    .unit-sel {
      border: 1.5px solid #e0e0e0; border-radius: 6px; padding: 4px 6px;
      font-size: 12px; font-family: 'Sarabun', sans-serif; background: white;
    }

    /* SUMMARY PAGE */
    .bill-header {
      background: #00B900; color: white; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 12px; text-align: center;
    }
    .bill-header h2 { font-size: 18px; font-weight: 700; }
    .bill-header p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    .bill-card { background: white; border-radius: 10px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .bill-row  { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .bill-row:last-child { border-bottom: none; }
    .bill-name  { flex: 1; font-size: 14px; }
    .bill-calc  { font-size: 12px; color: #888; margin: 0 8px; }
    .bill-amt   { font-weight: 700; color: #00B900; font-size: 14px; }
    .bill-total { display: flex; justify-content: space-between; padding: 12px 0 4px; }
    .bill-total-label { font-size: 16px; font-weight: 700; }
    .bill-total-amt   { font-size: 20px; font-weight: 700; color: #00B900; }

    .empty-msg { text-align: center; color: #aaa; padding: 40px 20px; font-size: 15px; }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; padding: 12px 16px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
      display: flex; gap: 10px;
    }
    .btn-confirm {
      flex: 1; padding: 14px; background: #00B900; color: white;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      font-family: 'Sarabun', sans-serif; cursor: pointer;
    }
    .btn-confirm:disabled { background: #aaa; }
    .btn-summary {
      padding: 14px 16px; background: #f0f0f0; color: #333;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      font-family: 'Sarabun', sans-serif; cursor: pointer; position: relative;
    }
    .badge {
      position: absolute; top: -6px; right: -6px; background: #ff4444;
      color: white; border-radius: 50%; width: 20px; height: 20px;
      font-size: 11px; display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    .spacer { height: 80px; }

    #loading { text-align: center; padding: 60px 20px; color: #888; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e0e0e0;
      border-top-color: #00B900; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  กำลังโหลดข้อมูล...
</div>

<div id="app" style="display:none;">
  <div class="header">
    <h1>🧾 ลูกชิ้นมนต์ชัย</h1>
    <p>เลือกสินค้าแล้วกดสรุปรายการ</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('search')">🔍 เลือกสินค้า</div>
    <div class="tab" onclick="switchTab('summary')" id="summaryTab">📋 สรุปรายการ</div>
  </div>

  <!-- หน้าค้นหา -->
  <div class="page active" id="searchPage">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="ค้นหาสินค้า..." oninput="renderProducts()">
    </div>
    <div class="cat-scroll" id="catList"></div>
    <div class="product-list" id="productList"></div>
    <div class="spacer"></div>
  </div>

  <!-- หน้าสรุป -->
  <div class="page" id="summaryPage">
    <div class="bill-header">
      <h2>🧾 ลูกชิ้นมนต์ชัย</h2>
      <p id="billDate"></p>
    </div>
    <div class="bill-card" id="billItems">
      <div class="empty-msg">ยังไม่มีรายการที่เลือกครับ</div>
    </div>
    <div class="bill-card" id="billTotalCard" style="display:none;">
      <div class="bill-total">
        <div class="bill-total-label">ยอดรวมทั้งสิ้น</div>
        <div class="bill-total-amt" id="billTotal">0 บาท</div>
      </div>
    </div>
    <div class="spacer"></div>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar" id="bottomBar" style="display:none;">
  <button class="btn-summary" onclick="switchTab('summary')">
    📋 สรุป
    <div class="badge" id="badge" style="display:none;">0</div>
  </button>
  <button class="btn-confirm" id="confirmBtn" onclick="submitOrder()">✅ ยืนยันและส่ง LINE</button>
</div>

<script>
const LIFF_ID = '2010175558-26n1GZ4C';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyphDzpsnZSkXrVUgn0uJjYJjHiXNm7M-Xh4r40jMyOJakjcOOvOHq5WJkSlxegAImV/exec';
const SHOP_NAME = 'ลูกชิ้นมนต์ชัย';

let allProducts  = [];
let selectedItems = {}; // { idx: { qty, unit } }
let currentCat   = 'ทั้งหมด';
let userProfile  = null;

// ==================== INIT ====================
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      try { userProfile = await liff.getProfile(); } catch(e) { userProfile = { userId: 'test' }; }
    } else if (liff.isInClient()) {
      liff.login(); return;
    } else {
      userProfile = { userId: 'test' };
    }

    await loadProducts();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('bottomBar').style.display = 'flex';

    const now = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('billDate').textContent = 'วันที่ ' + now;
  } catch(err) {
    document.getElementById('loading').innerHTML = '<div>❌ โหลดไม่ได้: ' + err.message + '</div>';
  }
}

// ==================== LOAD PRODUCTS ====================
async function loadProducts() {
  const CACHE_KEY    = 'mcProducts_v1';
  const CACHE_EXPIRE = 'mcProducts_exp';

  try {
    const exp    = localStorage.getItem(CACHE_EXPIRE);
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached && exp && Date.now() < parseInt(exp)) {
      allProducts = JSON.parse(cached);
      buildCats();
      renderProducts();
      fetch(`${GAS_URL}?action=getProducts`).then(r => r.json()).then(d => {
        allProducts = d;
        localStorage.setItem(CACHE_KEY, JSON.stringify(d));
        localStorage.setItem(CACHE_EXPIRE, Date.now() + 30 * 60 * 1000);
      }).catch(() => {});
      return;
    }
  } catch(e) {}

  const res   = await fetch(`${GAS_URL}?action=getProducts`);
  allProducts = await res.json();
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(allProducts));
    localStorage.setItem(CACHE_EXPIRE, Date.now() + 30 * 60 * 1000);
  } catch(e) {}
  buildCats();
  renderProducts();
}

// ==================== BUILD CATS ====================
function buildCats() {
  const cats = ['ทั้งหมด', ...new Set(allProducts.map(p => p.subCategory).filter(Boolean))];
  const el   = document.getElementById('catList');
  el.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { currentCat = cat; buildCats(); renderProducts(); };
    el.appendChild(btn);
  });
}

// ==================== RENDER PRODUCTS ====================
function renderProducts() {
  const search  = document.getElementById('searchInput').value.trim().toLowerCase();
  const list    = document.getElementById('productList');
  const filtered = allProducts.filter((p, i) => {
    const matchCat  = currentCat === 'ทั้งหมด' || p.subCategory === currentCat;
    const matchSearch = !search || p.name.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });

  list.innerHTML = '';
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-msg">ไม่พบสินค้าครับ</div>';
    return;
  }

  filtered.forEach((p, fi) => {
    const idx = allProducts.indexOf(p);
    const sel = selectedItems[idx];
    const qty = sel ? sel.qty : 0;
    const unit = sel ? sel.unit : 'ถุง';
    const isSelected = qty > 0;

    const item = document.createElement('div');
    item.className = 'product-item' + (isSelected ? ' selected' : '');

    const units = ['ถุง'];
    if (p.bagPerHiw) units.push('หิ้ว');
    if (p.kgPerBag)  units.push('โล');

    const unitOpts = units.map(u => `<option value="${u}" ${u === unit ? 'selected' : ''}>${u}</option>`).join('');

    item.innerHTML = `
      <div style="flex:1">
        <div class="prod-name">${p.name.split('หรือ')[0].trim()}</div>
        <div class="prod-price">${p.price} บ./ถุง${p.bulkPrice ? ` (ส่ง ${p.bulkPrice} บ.)` : ''}</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
        <input class="qty-input" type="number" min="0" value="${qty}" oninput="setQty(${idx}, this.value)">
        <button class="qty-btn plus" onclick="changeQty(${idx}, 1)">+</button>
        <select class="unit-sel" onchange="setUnit(${idx}, this.value)">${unitOpts}</select>
      </div>
    `;
    list.appendChild(item);
  });
}

// ==================== QTY CONTROLS ====================
function changeQty(idx, delta) {
  const sel = selectedItems[idx] || { qty: 0, unit: 'ถุง' };
  sel.qty   = Math.max(0, (sel.qty || 0) + delta);
  if (sel.qty > 0) selectedItems[idx] = sel;
  else delete selectedItems[idx];
  updateBadge();
  renderProducts();
  updateSummary();
}

function setQty(idx, val) {
  const qty = Math.max(0, parseInt(val) || 0);
  const sel = selectedItems[idx] || { qty: 0, unit: 'ถุง' };
  sel.qty   = qty;
  if (qty > 0) selectedItems[idx] = sel;
  else delete selectedItems[idx];
  updateBadge();
  updateSummary();
}

function setUnit(idx, unit) {
  if (!selectedItems[idx]) selectedItems[idx] = { qty: 0, unit };
  selectedItems[idx].unit = unit;
  updateSummary();
}

function updateBadge() {
  const count = Object.keys(selectedItems).length;
  const badge = document.getElementById('badge');
  badge.textContent = count;
  badge.style.display = count > 0 ? 'flex' : 'none';
}

// ==================== CALC PRICE ====================
function calcPrice(p, qty, unit) {
  let totalBags = qty;
  if (unit === 'หิ้ว' && p.bagPerHiw) totalBags = qty * p.bagPerHiw;
  if (unit === 'โล'   && p.kgPerBag)  totalBags = qty / p.kgPerBag;

  const isBulk      = p.minQty && p.bulkPrice && totalBags >= p.minQty;
  const pricePerBag = isBulk ? p.bulkPrice : p.price;

  let pricePerUnit = pricePerBag;
  if (unit === 'หิ้ว' && p.bagPerHiw) pricePerUnit = pricePerBag * p.bagPerHiw;
  else if (unit === 'โล' && p.kgPerBag) pricePerUnit = pricePerBag / p.kgPerBag;

  return { pricePerUnit, itemTotal: pricePerUnit * qty };
}

// ==================== UPDATE SUMMARY ====================
function updateSummary() {
  const billItems = document.getElementById('billItems');
  const keys = Object.keys(selectedItems).filter(i => selectedItems[i].qty > 0);

  if (keys.length === 0) {
    billItems.innerHTML = '<div class="empty-msg">ยังไม่มีรายการที่เลือกครับ</div>';
    document.getElementById('billTotalCard').style.display = 'none';
    return;
  }

  let grandTotal = 0;
  billItems.innerHTML = '';
  keys.forEach(idx => {
    const p   = allProducts[idx];
    const sel = selectedItems[idx];
    const { pricePerUnit, itemTotal } = calcPrice(p, sel.qty, sel.unit);
    grandTotal += itemTotal;

    const name = p.name.split('หรือ')[0].trim();
    const row  = document.createElement('div');
    row.className = 'bill-row';
    row.innerHTML = `
      <div class="bill-name">${name}</div>
      <div class="bill-calc">${sel.qty}${sel.unit}×${pricePerUnit}บ.</div>
      <div class="bill-amt">${itemTotal} บ.</div>
    `;
    billItems.appendChild(row);
  });

  document.getElementById('billTotal').textContent = grandTotal + ' บาท';
  document.getElementById('billTotalCard').style.display = 'block';
}

// ==================== SWITCH TAB ====================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'search') || (i === 1 && tab === 'summary'));
  });
  document.getElementById('searchPage').classList.toggle('active', tab === 'search');
  document.getElementById('summaryPage').classList.toggle('active', tab === 'summary');
  if (tab === 'summary') updateSummary();
}

// ==================== GENERATE BILL IMAGE ====================
function generateBillImage() {
  const keys = Object.keys(selectedItems).filter(i => selectedItems[i].qty > 0);
  const now  = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
  let grandTotal = 0;

  const rows = keys.map(idx => {
    const p   = allProducts[idx];
    const sel = selectedItems[idx];
    const { pricePerUnit, itemTotal } = calcPrice(p, sel.qty, sel.unit);
    grandTotal += itemTotal;
    return { name: p.name.split('หรือ')[0].trim(), calc: sel.qty + sel.unit + '×' + pricePerUnit + 'บ.', total: itemTotal };
  });

  const W = 360, ROW_H = 36;
  const H = 150 + rows.length * ROW_H + 60;
  const canvas = document.createElement('canvas');
  canvas.width  = W * 2; canvas.height = H * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#00B900'; ctx.fillRect(0, 0, W, 56);
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🧾 ' + SHOP_NAME, W/2, 28);
  ctx.font = '12px sans-serif';
  ctx.fillText('วันที่ ' + now, W/2, 46);

  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(16, 68); ctx.lineTo(W-16, 68); ctx.stroke();

  let y = 88;
  rows.forEach(row => {
    ctx.fillStyle = '#333'; ctx.font = '13px sans-serif'; ctx.textAlign = 'left';
    let name = row.name;
    if (ctx.measureText(name).width > 155) {
      while (ctx.measureText(name + '...').width > 155) name = name.slice(0, -1);
      name += '...';
    }
    ctx.fillText(name, 16, y);
    ctx.fillStyle = '#888'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(row.calc, W/2, y);
    ctx.fillStyle = '#00B900'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(row.total + ' บ.', W-16, y);
    y += ROW_H;
    ctx.strokeStyle = '#f5f5f5'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(16, y-8); ctx.lineTo(W-16, y-8); ctx.stroke();
  });

  y += 8;
  ctx.strokeStyle = '#00B900'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(16, y); ctx.lineTo(W-16, y); ctx.stroke();
  y += 26;
  ctx.fillStyle = '#333'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('ยอดรวมทั้งสิ้น', 16, y);
  ctx.fillStyle = '#00B900'; ctx.font = 'bold 19px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(grandTotal + ' บาท', W-16, y);

  return { imageBase64: canvas.toDataURL('image/png'), grandTotal };
}

// ==================== SUBMIT ====================
async function submitOrder() {
  const keys = Object.keys(selectedItems).filter(i => selectedItems[i].qty > 0);
  if (keys.length === 0) { alert('กรุณาเลือกสินค้าอย่างน้อย 1 รายการครับ'); return; }

  const btn = document.getElementById('confirmBtn');
  btn.disabled = true; btn.textContent = '⏳ กำลังสร้างรูป...';

  try {
    const items = keys.map(idx => {
      const p   = allProducts[idx];
      const sel = selectedItems[idx];
      return { name: p.name.split('หรือ')[0].trim(), qty: sel.qty, unit: sel.unit };
    });

    // สร้างรูปบิล
    let imageUrl = null;
    try {
      const { imageBase64 } = generateBillImage();
      btn.textContent = '⏳ กำลังอัพโหลดรูป...';

      const base64Data = imageBase64.replace('data:image/png;base64,', '');
      const formData   = new FormData();
      formData.append('key', '323f3ae0cacf9ccb4711ef15746f14f5');
      formData.append('image', base64Data);
      formData.append('name', 'bill_montchai_' + Date.now());

      const imgRes  = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
      const imgData = await imgRes.json();
      if (imgData.success) imageUrl = imgData.data.url;
    } catch(e) { console.log('image error:', e); }

    btn.textContent = '⏳ กำลังส่ง...';

    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: imageUrl ? 'sendImageAndSave' : 'submitOrder',
        userId: userProfile.userId,
        customerName: SHOP_NAME,
        items, imageUrl
      })
    });

    alert('✅ ส่งรายการเรียบร้อยแล้วครับ!\nกรุณาตรวจสอบรูปใน LINE');
    liff.closeWindow();
  } catch(err) {
    alert('❌ ส่งไม่ได้: ' + err.message);
  }

  btn.disabled = false; btn.textContent = '✅ ยืนยันและส่ง LINE';
}

init();
</script>
</body>
</html>
