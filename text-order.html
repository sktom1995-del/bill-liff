<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>สั่งสินค้า (พิมพ์ข้อความ)</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f5f5f5; color: #333; }

    .header { background: #00B900; color: white; padding: 14px 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,185,0,0.3); }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    #app { padding: 12px; max-width: 480px; margin: 0 auto; padding-bottom: 100px; }

    .card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    /* INPUT FORM */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; font-weight: 600; }
    .field input[type="text"] {
      width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; font-family: 'Sarabun', sans-serif; background: white;
    }
    .field input[type="text"]:focus { outline: none; border-color: #00B900; }

    textarea {
      width: 100%; min-height: 220px; padding: 12px; border: 1.5px solid #e0e0e0;
      border-radius: 8px; font-size: 15px; font-family: 'Sarabun', sans-serif;
      resize: vertical; line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: #00B900; }
    textarea::placeholder { color: #bbb; }

    .hint { font-size: 12px; color: #999; margin-top: 6px; line-height: 1.5; }
    .hint b { color: #666; }

    .btn-calc {
      width: 100%; padding: 13px; background: #1a73e8; color: white; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Sarabun', sans-serif;
      cursor: pointer; margin-top: 4px;
    }
    .btn-calc:disabled { background: #aaa; }

    /* RESULT */
    #resultCard { display: none; }
    .result-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; gap: 8px; }
    .result-row:last-child { border-bottom: none; }
    .result-row.notfound .result-name { color: #e53935; }
    .result-row.uncertain { flex-direction: column; background: #fff8e1; border-radius: 8px; padding: 10px; margin: 4px 0; border-bottom: none; }
    .uncertain-label { font-size: 13px; color: #f57c00; font-weight: 600; margin-bottom: 8px; }
    .uncertain-label b { color: #e65100; }
    .suggest-btns { display: flex; flex-wrap: wrap; gap: 6px; }
    .suggest-btn { padding: 8px 12px; background: white; border: 1.5px solid #ffb74d; border-radius: 8px; font-size: 13px; font-family: 'Sarabun', sans-serif; color: #333; cursor: pointer; }
    .suggest-btn:active { background: #fff3e0; }
    .suggest-btn.skip { border-color: #ddd; color: #999; }
    .result-name { flex: 1; color: #333; line-height: 1.4; }
    .result-calc { color: #888; font-size: 12px; white-space: nowrap; }
    .result-amt { font-weight: 700; color: #00B900; white-space: nowrap; min-width: 60px; text-align: right; }
    .total-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 4px; margin-top: 6px; border-top: 2px solid #00B900; }
    .total-label { font-size: 16px; font-weight: 700; }
    .total-amount { font-size: 22px; font-weight: 700; color: #00B900; }

    .error-box { background: #fff3f3; border: 1px solid #ffcdd2; border-radius: 8px; padding: 12px; color: #c62828; font-size: 14px; margin-top: 4px; display: none; }

    /* BOTTOM BAR */
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: white; box-shadow: 0 -2px 12px rgba(0,0,0,0.1); display: flex; gap: 10px; max-width: 480px; margin: 0 auto; }
    .btn-submit { flex: 1; padding: 13px; background: #00B900; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Sarabun', sans-serif; cursor: pointer; }
    .btn-submit:disabled { background: #ccc; }
    .btn-edit { flex: 1; padding: 13px; background: white; color: #666; border: 1.5px solid #ddd; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Sarabun', sans-serif; cursor: pointer; }
  </style>
</head>
<body>

<div class="header">
  <h1>📝 สั่งสินค้า (พิมพ์ข้อความ)</h1>
  <p>พิมพ์รายการแล้วกดคำนวณราคา</p>
</div>

<div id="app">
  <!-- ฟอร์มพิมพ์ -->
  <div class="card" id="inputCard">
    <div class="card-title">รายการสั่งสินค้า</div>

    <div class="field">
      <label>ชื่อลูกค้า / ชื่อร้าน</label>
      <input type="text" id="customerInput" placeholder="เช่น ร้านสังกะสี">
    </div>

    <div class="field">
      <label>รายการสินค้า (1 บรรทัดต่อ 1 รายการ)</label>
      <textarea id="orderText" placeholder="ลูกชิ้นหมู 5
วุ้นเส้น 2 หิ้ว
ไส้กรอกแดง 3 ถุง
หมูฟ้ากลาง 10 โล"></textarea>
      <div class="hint">
        รูปแบบ: <b>ชื่อสินค้า จำนวน หน่วย</b><br>
        หน่วยที่รองรับ: ถุง (ไม่ใส่ก็ได้), หิ้ว, โล, ลัง
      </div>
    </div>

    <button class="btn-calc" id="calcBtn" onclick="calculateOrder()">🧮 คำนวณราคา</button>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- ผลลัพธ์ -->
  <div class="card" id="resultCard">
    <div class="card-title">ผลการคำนวณ</div>
    <div id="resultCustomer" style="font-size:15px; font-weight:700; margin-bottom:8px; color:#333;"></div>
    <div id="resultList"></div>
    <div class="total-row">
      <div class="total-label">ยอดรวมทั้งสิ้น</div>
      <div class="total-amount" id="totalAmount">0 บาท</div>
    </div>
  </div>
</div>

<!-- ปุ่มด้านล่าง (โผล่หลังคำนวณ) -->
<div class="bottom-bar" id="bottomBar" style="display:none;">
  <button class="btn-edit" onclick="backToEdit()">✏️ แก้ไข</button>
  <button class="btn-submit" id="submitBtn" onclick="submitOrder()">✅ ยืนยันและส่ง LINE</button>
</div>

<script>
const LIFF_ID = '2010175558-CXXV0qXs'; // TODO: ใส่ LIFF ID ของหน้านี้
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyphDzpsnZSkXrVUgn0uJjYJjHiXNm7M-Xh4r40jMyOJakjcOOvOHq5WJkSlxegAImV/exec';

let userProfile = null;
let lastResult   = null;

// ==================== INIT (ไม่ต้องโหลดสินค้าเลย เร็วมาก) ====================
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      try { userProfile = await liff.getProfile(); } catch(e) { userProfile = { userId: 'test-user' }; }
    } else if (liff.isInClient()) {
      liff.login(); return;
    } else {
      userProfile = { userId: 'test-user' };
    }
  } catch(err) {
    userProfile = { userId: 'test-user' };
    console.log('LIFF init error (ใช้งานนอก LINE):', err);
  }
}

// ==================== คำนวณราคา (ส่งไป GAS) ====================
async function calculateOrder() {
  const customer = document.getElementById('customerInput').value.trim();
  const text     = document.getElementById('orderText').value.trim();
  const errorBox = document.getElementById('errorBox');
  errorBox.style.display = 'none';

  if (!customer) { showError('กรุณากรอกชื่อลูกค้าก่อนครับ'); return; }
  if (!text)     { showError('กรุณาพิมพ์รายการสินค้าก่อนครับ'); return; }

  const btn = document.getElementById('calcBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังคำนวณ...';

  try {
    const orderText = customer + '\n' + text;
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'calcTextOrder', orderText })
    });
    const data = await res.json();

    if (!data.ok || data.error) {
      showError(data.error || 'คำนวณไม่ได้ ลองตรวจสอบรูปแบบข้อความอีกครั้งครับ');
      return;
    }

    lastResult = data.result;
    renderResult(lastResult);

    document.getElementById('inputCard').style.display = 'none';
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('bottomBar').style.display = 'flex';

  } catch(err) {
    showError('เกิดข้อผิดพลาด: ' + err.message);
  }

  btn.disabled = false;
  btn.textContent = '🧮 คำนวณราคา';
}

function showError(msg) {
  const errorBox = document.getElementById('errorBox');
  errorBox.textContent = '❌ ' + msg;
  errorBox.style.display = 'block';
}

// ==================== แสดงผลลัพธ์ ====================
function renderResult(result) {
  document.getElementById('resultCustomer').textContent = 'ลูกค้า: ' + result.customerName;
  const list = document.getElementById('resultList');
  list.innerHTML = '';

  result.items.forEach((item, idx) => {
    // กรณีไม่ชัวร์ → แสดงปุ่มให้เลือก
    if (item.uncertain && item.suggestions && item.suggestions.length > 0) {
      const row = document.createElement('div');
      row.className = 'result-row uncertain';
      let btns = item.suggestions.map(s =>
        `<button class="suggest-btn" onclick="pickProduct(${idx}, '${s.replace(/'/g, "\\'")}')">${s}</button>`
      ).join('');
      btns += `<button class="suggest-btn skip" onclick="pickProduct(${idx}, null)">ข้ามรายการนี้</button>`;
      row.innerHTML = `
        <div class="uncertain-label">🤔 "<b>${item.inputName}</b>" หมายถึงตัวไหนครับ?</div>
        <div class="suggest-btns">${btns}</div>
      `;
      list.appendChild(row);
      return;
    }

    const parts = item.found ? item.displayLabel.split('|') : [item.displayLabel, '', '0'];
    const name  = parts[0] ? parts[0].trim() : item.matchedName;
    const calc  = parts[1] ? parts[1].trim() : '';
    const total = parts[2] ? parts[2].trim() : '0';

    const row = document.createElement('div');
    row.className = 'result-row' + (item.found ? '' : ' notfound');
    row.innerHTML = `
      <div class="result-name">${name}${item.found ? '' : ' ⚠️'}</div>
      <div class="result-calc">${calc}</div>
      <div class="result-amt">${total} บ.</div>
    `;
    list.appendChild(row);
  });

  document.getElementById('totalAmount').textContent = result.grandTotal + ' บาท';

  // ถ้ามีตัวที่ไม่ชัวร์ → ปิดปุ่มยืนยันไว้ก่อน
  const hasUncertain = result.items.some(it => it.uncertain);
  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn) {
    submitBtn.disabled = hasUncertain;
    submitBtn.textContent = hasUncertain ? '⚠️ กรุณาเลือกสินค้าให้ครบก่อน' : '✅ ยืนยันและส่ง LINE';
  }
}

// ==================== ผู้ใช้เลือกสินค้าที่ไม่ชัวร์ ====================
function pickProduct(idx, productName) {
  const item = lastResult.items[idx];
  if (productName === null) {
    // ข้ามรายการนี้ — ลบออก
    lastResult.items.splice(idx, 1);
  } else {
    // แก้ข้อความในช่อง textarea แล้วคำนวณใหม่
    const text = document.getElementById('orderText').value;
    const lines = text.split('\n');
    // หาบรรทัดที่มีชื่อเดิม แล้วแทนที่ด้วยชื่อที่เลือก
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes(item.inputName)) {
        lines[i] = lines[i].replace(item.inputName, productName);
        break;
      }
    }
    document.getElementById('orderText').value = lines.join('\n');
  }
  // คำนวณใหม่
  calculateOrder();
}

// ==================== กลับไปแก้ไข ====================
function backToEdit() {
  document.getElementById('inputCard').style.display = 'block';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('bottomBar').style.display = 'none';
}

// ==================== สร้างรูปบิล (Canvas) ====================
function generateBillImage(result) {
  const now = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
  const rows = result.items.map(item => {
    const parts = item.found ? item.displayLabel.split('|') : [item.matchedName, '', '0'];
    const name  = parts[0] ? parts[0].trim() : item.matchedName;
    const calc  = parts[1] ? parts[1].trim() : '';
    const total = parts[2] ? parts[2].trim() : '0';
    return { name, calc, total, found: item.found };
  });

  const W = 360, ROW_H = 36;
  const H = 130 + rows.length * ROW_H + 60;
  const canvas = document.createElement('canvas');
  canvas.width = W * 2; canvas.height = H * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#00B900'; ctx.fillRect(0, 0, W, 56);
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🧾 ร้านลูกชิ้นมนต์ชัย', W/2, 22);
  ctx.font = '11px sans-serif';
  ctx.fillText('📞 077210037  |  LINE: 077210037', W/2, 38);
  ctx.fillText('ลูกค้า: ' + result.customerName, W/2, 52);

  let y = 76;
  rows.forEach(row => {
    ctx.fillStyle = row.found ? '#333' : '#e53935';
    ctx.font = '13px sans-serif'; ctx.textAlign = 'left';
    let name = row.name;
    if (ctx.measureText(name).width > 230) {
      while (ctx.measureText(name + '...').width > 230) name = name.slice(0, -1);
      name += '...';
    }
    ctx.fillText(name, 16, y);
    ctx.fillStyle = '#888'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(row.calc, W/2, y);
    ctx.fillStyle = '#00B900'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(row.total + ' บ.', W-16, y);
    y += ROW_H;
    ctx.strokeStyle = '#f5f5f5'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(16, y-8); ctx.lineTo(W-16, y-8); ctx.stroke();
  });

  y += 8;
  ctx.strokeStyle = '#00B900'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(16, y); ctx.lineTo(W-16, y); ctx.stroke();
  y += 26;
  ctx.fillStyle = '#333'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('ยอดรวมทั้งสิ้น', 16, y);
  ctx.fillStyle = '#00B900'; ctx.font = 'bold 19px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(result.grandTotal + ' บาท', W-16, y);

  return canvas.toDataURL('image/png');
}

// ==================== ส่งเข้า LINE ====================
async function submitOrder() {
  if (!lastResult) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังสร้างรูป...';

  try {
    let imageUrl = null;
    try {
      const imageBase64 = generateBillImage(lastResult);
      btn.textContent = '⏳ กำลังอัพโหลดรูป...';
      const base64Data = imageBase64.replace('data:image/png;base64,', '');
      const formData   = new FormData();
      formData.append('key', '323f3ae0cacf9ccb4711ef15746f14f5');
      formData.append('image', base64Data);
      formData.append('name', 'bill_' + lastResult.customerName + '_' + Date.now());
      const imgRes  = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
      const imgData = await imgRes.json();
      if (imgData.success) imageUrl = imgData.data.url;
    } catch(e) { console.log('image error:', e); }

    btn.textContent = '⏳ กำลังส่ง...';
    // DEBUG: ไม่ใช้ no-cors เพื่อดู response จริง
    const sendRes = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'sendImageAndSave',
        userId: userProfile.userId,
        customerName: lastResult.customerName,
        items: lastResult.items,
        itemsWithLabel: lastResult.items,
        grandTotal: lastResult.grandTotal,
        imageUrl: imageUrl
      })
    });
    const sendData = await sendRes.json();
    alert('DEBUG response: ' + JSON.stringify(sendData));

    alert('✅ ส่งรายการเรียบร้อยแล้วครับ!\nรอรับรูปและลิงก์ PDF ใน LINE สักครู่ครับ');
    liff.closeWindow();
  } catch(err) {
    alert('❌ ส่งไม่ได้: ' + err.message);
  }

  btn.disabled = false;
  btn.textContent = '✅ ยืนยันและส่ง LINE';
}

init();
</script>
</body>
</html>
