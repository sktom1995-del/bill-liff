<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>สั่งสินค้า (พิมพ์ข้อความ)</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f5f5f5; color: #333; }

    .header { background: #00B900; color: white; padding: 14px 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,185,0,0.3); }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    #app { padding: 12px; max-width: 480px; margin: 0 auto; padding-bottom: 100px; }

    .card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    /* INPUT FORM */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; font-weight: 600; }
    .field input[type="text"] {
      width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; font-family: 'Sarabun', sans-serif; background: white;
    }
    .field input[type="text"]:focus { outline: none; border-color: #00B900; }

    textarea {
      width: 100%; min-height: 220px; padding: 12px; border: 1.5px solid #e0e0e0;
      border-radius: 8px; font-size: 15px; font-family: 'Sarabun', sans-serif;
      resize: vertical; line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: #00B900; }
    textarea::placeholder { color: #bbb; }

    /* แถบเลขบรรทัด (gutter) */
    .editor-wrap { display: flex; border: 1.5px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .editor-wrap:focus-within { border-color: #00B900; }
    .line-gutter {
      flex: 0 0 auto; min-width: 32px; padding: 12px 6px; text-align: right;
      background: #f7f7f7; color: #bbb; font-size: 15px; line-height: 1.6;
      font-family: 'Sarabun', sans-serif; user-select: none; overflow: hidden;
      white-space: pre; border-right: 1px solid #eee;
    }
    .editor-wrap textarea {
      border: none; border-radius: 0; min-height: 220px; flex: 1;
    }
    .editor-wrap textarea:focus { border: none; }

    .hint { font-size: 12px; color: #999; margin-top: 6px; line-height: 1.5; }
    .hint b { color: #666; }

    .btn-calc {
      width: 100%; padding: 13px; background: #1a73e8; color: white; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Sarabun', sans-serif;
      cursor: pointer; margin-top: 4px;
    }
    .btn-calc:disabled { background: #aaa; }

    /* RESULT */
    #resultCard { display: none; }
    .result-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; gap: 8px; }
    .result-row:last-child { border-bottom: none; }
    .result-row.notfound .result-name { color: #e53935; }
    .result-row.uncertain { flex-direction: column; background: #fff8e1; border-radius: 8px; padding: 10px; margin: 4px 0; border-bottom: none; }
    .uncertain-label { font-size: 13px; color: #f57c00; font-weight: 600; margin-bottom: 8px; }
    .uncertain-label b { color: #e65100; }
    .suggest-btns { display: flex; flex-wrap: wrap; gap: 6px; }
    .suggest-btn { padding: 8px 12px; background: white; border: 1.5px solid #ffb74d; border-radius: 8px; font-size: 13px; font-family: 'Sarabun', sans-serif; color: #333; cursor: pointer; }
    .suggest-btn:active { background: #fff3e0; }
    .suggest-btn.skip { border-color: #ddd; color: #999; }

    /* ปุ่มเปลี่ยนรุ่น (บนแต่ละรายการ) */
    .result-item { padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .result-item:last-child { border-bottom: none; }
    .result-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .result-item-name { font-size: 14px; font-weight: 600; color: #333; }
    .result-item.notfound .result-item-name { color: #e53935; }
    .result-item-calc { font-size: 12px; color: #999; margin-top: 2px; }
    .result-item-src { font-size: 11px; color: #bbb; margin-top: 3px; font-family: monospace; }
    .check-summary { padding: 10px 12px; border-radius: 8px; font-size: 14px; font-weight: 600; margin-bottom: 12px; text-align: center; }
    .check-summary.ok { background: #e8f5e9; color: #2e7d32; }
    .check-summary.warn { background: #fff8e1; color: #f57f17; }
    .result-item-amt { font-size: 14px; font-weight: 700; color: #00B900; white-space: nowrap; }
    .change-btn {
      margin-top: 8px; display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 10px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px;
      font-size: 12px; font-family: 'Sarabun', sans-serif; color: #666; cursor: pointer;
    }
    .change-btn:active { background: #eee; }

    /* Bottom sheet เลือกรุ่น */
    .sheet-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 200; align-items: flex-end;
    }
    .sheet-overlay.show { display: flex; }
    .sheet {
      width: 100%; max-width: 480px; margin: 0 auto; background: white;
      border-radius: 18px 18px 0 0; padding: 16px; max-height: 70vh; overflow-y: auto;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 12px; }
    .sheet-title { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 2px; }
    .sheet-sub { font-size: 12px; color: #999; margin-bottom: 14px; }
    .variant-btn {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; margin-bottom: 8px; background: white; border: 1.5px solid #e0e0e0;
      border-radius: 10px; font-family: 'Sarabun', sans-serif; cursor: pointer; text-align: left;
    }
    .variant-btn:active { background: #f5f5f5; }
    .variant-btn.selected { border-color: #00B900; background: #f1f8e9; }
    .variant-name { font-size: 14px; font-weight: 600; color: #333; }
    .variant-price { font-size: 14px; font-weight: 600; color: #00B900; }
    .variant-btn.selected .variant-price { color: #2e7d32; }
    .result-name { flex: 1; color: #333; line-height: 1.4; }
    .result-calc { color: #888; font-size: 12px; white-space: nowrap; }
    .result-amt { font-weight: 700; color: #00B900; white-space: nowrap; min-width: 60px; text-align: right; }
    .total-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 4px; margin-top: 6px; border-top: 2px solid #00B900; }
    .total-label { font-size: 16px; font-weight: 700; }
    .total-amount { font-size: 22px; font-weight: 700; color: #00B900; }

    .error-box { background: #fff3f3; border: 1px solid #ffcdd2; border-radius: 8px; padding: 12px; color: #c62828; font-size: 14px; margin-top: 4px; display: none; }

    /* BOTTOM BAR */
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: white; box-shadow: 0 -2px 12px rgba(0,0,0,0.1); display: flex; gap: 10px; max-width: 480px; margin: 0 auto; }
    .btn-submit { flex: 1; padding: 13px; background: #00B900; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Sarabun', sans-serif; cursor: pointer; }
    .btn-submit:disabled { background: #ccc; }
    .btn-edit { flex: 1; padding: 13px; background: white; color: #666; border: 1.5px solid #ddd; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Sarabun', sans-serif; cursor: pointer; }
  </style>
</head>
<body>

<div class="header">
  <h1>📝 สั่งสินค้า (พิมพ์ข้อความ)</h1>
  <p>พิมพ์รายการแล้วกดคำนวณราคา</p>
</div>

<div id="app">
  <!-- ฟอร์มพิมพ์ -->
  <div class="card" id="inputCard">
    <div class="card-title">รายการสั่งสินค้า</div>

    <div class="field">
      <label>ชื่อลูกค้า / ชื่อร้าน</label>
      <input type="text" id="customerInput" placeholder="เช่น ร้านสังกะสี">
    </div>

    <div class="field">
      <label>รายการสินค้า (1 บรรทัดต่อ 1 รายการ)</label>
      <div class="editor-wrap">
        <div class="line-gutter" id="lineGutter">1</div>
        <textarea id="orderText" placeholder="ลูกชิ้นหมู 5
วุ้นเส้น 2 หิ้ว
ไส้กรอกแดง 3 ถุง
หมูฟ้ากลาง 10 โล"></textarea>
      </div>
      <div class="hint">
        รูปแบบ: <b>ชื่อสินค้า จำนวน หน่วย</b><br>
        หน่วยที่รองรับ: ถุง (ไม่ใส่ก็ได้), หิ้ว, โล, ลัง
      </div>
    </div>

    <button class="btn-calc" id="calcBtn" onclick="calculateOrder()">🧮 คำนวณราคา</button>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- ผลลัพธ์ -->
  <div class="card" id="resultCard">
    <div class="card-title">ผลการคำนวณ</div>
    <div id="resultCustomer" style="font-size:15px; font-weight:700; margin-bottom:8px; color:#333;"></div>
    <div id="resultList"></div>
    <div class="total-row">
      <div class="total-label">ยอดรวมทั้งสิ้น</div>
      <div class="total-amount" id="totalAmount">0 บาท</div>
    </div>
  </div>
</div>

<!-- ปุ่มด้านล่าง (โผล่หลังคำนวณ) -->
<div class="bottom-bar" id="bottomBar" style="display:none;">
  <button class="btn-edit" onclick="backToEdit()">✏️ แก้ไข</button>
  <button class="btn-submit" id="submitBtn" onclick="submitOrder()">✅ ยืนยันและส่ง LINE</button>
</div>

<!-- แผงเลือกรุ่นสินค้า -->
<div class="sheet-overlay" id="variantOverlay" onclick="if(event.target===this)closeVariantSheet()">
  <div class="sheet" id="variantSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="variantTitle">เลือกรุ่น</div>
    <div class="sheet-sub">แตะเพื่อเปลี่ยนรุ่นสินค้า ราคาจะอัปเดตทันที</div>
    <div id="variantList"></div>
  </div>
</div>

<script>
const LIFF_ID = '2010175558-CXXV0qXs'; // TODO: ใส่ LIFF ID ของหน้านี้
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyphDzpsnZSkXrVUgn0uJjYJjHiXNm7M-Xh4r40jMyOJakjcOOvOHq5WJkSlxegAImV/exec';

let userProfile = null;
let lastResult   = null;
let overrides    = {};  // { "ชื่อที่พิมพ์": "ชื่อเต็มรุ่นที่เลือก" }

// ==================== INIT (ไม่ต้องโหลดสินค้าเลย เร็วมาก) ====================
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      try { userProfile = await liff.getProfile(); } catch(e) { userProfile = { userId: 'test-user' }; }
    } else if (liff.isInClient()) {
      liff.login(); return;
    } else {
      userProfile = { userId: 'test-user' };
    }
  } catch(err) {
    userProfile = { userId: 'test-user' };
    console.log('LIFF init error (ใช้งานนอก LINE):', err);
  }
  setupLineGutter();
}

// ==================== แถบเลขบรรทัด ====================
function setupLineGutter() {
  const ta     = document.getElementById('orderText');
  const gutter = document.getElementById('lineGutter');
  if (!ta || !gutter) return;

  function updateGutter() {
    const lines = ta.value.split('\n').length || 1;
    let nums = '';
    for (let i = 1; i <= lines; i++) nums += i + '\n';
    gutter.textContent = nums;
  }
  // อัปเดตเลขทุกครั้งที่พิมพ์
  ta.addEventListener('input', updateGutter);
  // เลื่อน gutter ตาม textarea
  ta.addEventListener('scroll', function() { gutter.scrollTop = ta.scrollTop; });
  updateGutter();
}

// ==================== คำนวณราคา (ส่งไป GAS) ====================
async function calculateOrder() {
  const customer = document.getElementById('customerInput').value.trim();
  const text     = document.getElementById('orderText').value.trim();
  const errorBox = document.getElementById('errorBox');
  errorBox.style.display = 'none';

  if (!customer) { showError('กรุณากรอกชื่อลูกค้าก่อนครับ'); return; }
  if (!text)     { showError('กรุณาพิมพ์รายการสินค้าก่อนครับ'); return; }

  const btn = document.getElementById('calcBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังคำนวณ...';

  try {
    const orderText = customer + '\n' + text;
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'calcTextOrder', orderText, overrides })
    });
    const data = await res.json();

    if (!data.ok || data.error) {
      showError(data.error || 'คำนวณไม่ได้ ลองตรวจสอบรูปแบบข้อความอีกครั้งครับ');
      return;
    }

    lastResult = data.result;
    renderResult(lastResult);

    document.getElementById('inputCard').style.display = 'none';
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('bottomBar').style.display = 'flex';

  } catch(err) {
    showError('เกิดข้อผิดพลาด: ' + err.message);
  }

  btn.disabled = false;
  btn.textContent = '🧮 คำนวณราคา';
}

function showError(msg) {
  const errorBox = document.getElementById('errorBox');
  errorBox.textContent = '❌ ' + msg;
  errorBox.style.display = 'block';
}

// ==================== แสดงผลลัพธ์ ====================
function renderResult(result) {
  document.getElementById('resultCustomer').textContent = 'ลูกค้า: ' + result.customerName;
  const list = document.getElementById('resultList');
  list.innerHTML = '';

  // ===== แถบสรุป: นับว่าครบไหม =====
  const totalItems   = result.items.length;
  const foundItems   = result.items.filter(it => it.found).length;
  const uncertainCnt = result.items.filter(it => it.uncertain).length;
  const notFoundCnt  = result.items.filter(it => !it.found && !it.uncertain).length;
  const typedCount   = result.inputLineCount || totalItems;

  const summary = document.createElement('div');
  const allGood = (foundItems === totalItems && totalItems === typedCount);
  summary.className = 'check-summary ' + (allGood ? 'ok' : 'warn');
  let summaryText;
  if (allGood) {
    summaryText = `✅ พิมพ์มา ${typedCount} รายการ · คำนวณครบทุกตัว`;
  } else {
    let parts = [`พิมพ์มา ${typedCount}`, `คำนวณได้ ${foundItems}`];
    if (uncertainCnt > 0) parts.push(`ต้องเลือก ${uncertainCnt}`);
    if (notFoundCnt > 0)  parts.push(`ไม่พบ ${notFoundCnt}`);
    summaryText = '⚠️ ' + parts.join(' · ');
  }
  summary.textContent = summaryText;
  list.appendChild(summary);

  result.items.forEach((item, idx) => {
    // กรณีไม่ชัวร์ → แสดงปุ่มให้เลือก (fuzzy ไม่เจอ)
    if (item.uncertain && item.suggestions && item.suggestions.length > 0) {
      const row = document.createElement('div');
      row.className = 'result-row uncertain';
      let btns = item.suggestions.map((s, sIdx) =>
        `<button class="suggest-btn" onclick="pickProduct(${idx}, ${sIdx})">${s.name}<br><span style="font-size:11px;color:#00B900;">${s.total} บ.</span></button>`
      ).join('');
      btns += `<button class="suggest-btn skip" onclick="pickProduct(${idx}, -1)">ข้ามรายการนี้</button>`;
      row.innerHTML = `
        <div class="uncertain-label">🤔 "<b>${item.inputName}</b>" หมายถึงตัวไหนครับ?</div>
        <div class="suggest-btns">${btns}</div>
      `;
      list.appendChild(row);
      return;
    }

    const parts = item.found ? item.displayLabel.split('|') : [item.displayLabel, '', '0'];
    const name  = parts[0] ? parts[0].trim() : item.matchedName;
    const calc  = parts[1] ? parts[1].trim() : '';
    const total = parts[2] ? parts[2].trim() : '0';

    const wrap = document.createElement('div');
    wrap.className = 'result-item' + (item.found ? '' : ' notfound');

    let html = `
      <div class="result-item-top">
        <div style="flex:1;">
          <div class="result-item-name">${name}${item.found ? '' : ' ⚠️'}</div>
          <div class="result-item-calc">${calc}</div>
          <div class="result-item-src">✎ พิมพ์: "${item.originalText || ''}"</div>
        </div>
        <div class="result-item-amt">${total} บ.</div>
      </div>`;

    // ถ้าสินค้ามีหลายรุ่นในกลุ่ม → แสดงปุ่มเปลี่ยน
    if (item.found && item.variants && item.variants.length > 1) {
      html += `<button class="change-btn" onclick="openVariantSheet(${idx})">🔄 เปลี่ยนรุ่น (${item.variants.length} แบบ)</button>`;
    }

    wrap.innerHTML = html;
    list.appendChild(wrap);
  });

  document.getElementById('totalAmount').textContent = result.grandTotal + ' บาท';

  // ถ้ามีตัวที่ไม่ชัวร์ → ปิดปุ่มยืนยันไว้ก่อน
  const hasUncertain = result.items.some(it => it.uncertain);
  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn) {
    submitBtn.disabled = hasUncertain;
    submitBtn.textContent = hasUncertain ? '⚠️ กรุณาเลือกสินค้าให้ครบก่อน' : '✅ ยืนยันและส่ง LINE';
  }
}

// ==================== ผู้ใช้เลือกสินค้าที่ไม่ชัวร์ → อัปเดตทันที (ไม่เรียก GAS) ====================
function pickProduct(idx, sIdx) {
  const item = lastResult.items[idx];

  if (sIdx === -1) {
    // ข้ามรายการนี้ — ลบออกจากจอทันที
    lastResult.items.splice(idx, 1);
    recalcGrandTotal();
    renderResult(lastResult);
    return;
  }

  // หยิบตัวเลือกที่เลือก (มีราคาคำนวณมาแล้วจาก backend)
  const chosen = item.suggestions[sIdx];
  if (!chosen) return;

  // แปลง item นี้จาก "ไม่ชัวร์" เป็น "พบแล้ว" ด้วยข้อมูลที่เลือก
  item.found        = true;
  item.uncertain    = false;
  item.suggestions  = null;
  item.matchedName  = chosen.name;
  item.matchedFull  = chosen.fullName;
  item.displayLabel = chosen.displayLabel;
  item.total        = chosen.total;
  overrides[item.inputName] = chosen.fullName;  // จำไว้ใช้ตอนส่ง LINE

  recalcGrandTotal();
  renderResult(lastResult);  // วาดใหม่ทันที ไม่ต้องรอ GAS
}

// ==================== เปิดแผงเลือกรุ่น ====================
function openVariantSheet(idx) {
  const item = lastResult.items[idx];
  if (!item.variants || item.variants.length < 2) return;

  document.getElementById('variantTitle').textContent = 'เลือกรุ่น "' + (item.groupName || item.matchedName) + '"';

  const listEl = document.getElementById('variantList');
  listEl.innerHTML = '';
  item.variants.forEach(v => {
    const isSelected = (v.fullName === item.matchedFull);
    const btn = document.createElement('button');
    btn.className = 'variant-btn' + (isSelected ? ' selected' : '');
    btn.innerHTML = `
      <span class="variant-name">${v.name}${isSelected ? ' ✓' : ''}</span>
      <span class="variant-price">${v.total} บ.</span>
    `;
    btn.onclick = () => selectVariant(idx, v);
    listEl.appendChild(btn);
  });

  document.getElementById('variantOverlay').classList.add('show');
}

function closeVariantSheet() {
  document.getElementById('variantOverlay').classList.remove('show');
}

// ==================== เลือกรุ่นใหม่ → อัปเดตในเครื่องทันที (ไม่เรียก GAS) ====================
function selectVariant(idx, variant) {
  const item = lastResult.items[idx];

  // อัปเดตข้อมูล item ในเครื่องเลย
  item.matchedName  = variant.name;
  item.matchedFull  = variant.fullName;
  item.displayLabel = variant.displayLabel;
  item.total        = variant.total;
  overrides[item.inputName] = variant.fullName;  // จำไว้ใช้ตอนส่ง LINE

  // คำนวณยอดรวมใหม่จากข้อมูลในเครื่อง
  recalcGrandTotal();
  closeVariantSheet();
  renderResult(lastResult);  // วาดใหม่ทันที ไม่ต้องรอ GAS
}

// ==================== คำนวณยอดรวมใหม่จากข้อมูลในเครื่อง ====================
function recalcGrandTotal() {
  let sum = 0;
  lastResult.items.forEach(it => { if (it.found) sum += (it.total || 0); });
  lastResult.grandTotal = sum;
}

// ==================== กลับไปแก้ไข ====================
function backToEdit() {
  overrides = {};  // เคลียร์รุ่นที่เคยเลือก เพราะกำลังจะแก้ข้อความใหม่
  document.getElementById('inputCard').style.display = 'block';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('bottomBar').style.display = 'none';
}

// ==================== สร้างรูปบิล (Canvas) ====================
function generateBillImage(result) {
  const now = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
  const rows = result.items.map(item => {
    const parts = item.found ? item.displayLabel.split('|') : [item.matchedName, '', '0'];
    const name  = parts[0] ? parts[0].trim() : item.matchedName;
    const calc  = parts[1] ? parts[1].trim() : '';
    const total = parts[2] ? parts[2].trim() : '0';
    return { name, calc, total, found: item.found };
  });

  const W = 360, ROW_H = 36;
  const HEAD_H = 74;   // ความสูงส่วนหัวใหม่
  const H = HEAD_H + rows.length * ROW_H + 76;
  const canvas = document.createElement('canvas');
  canvas.width = W * 2; canvas.height = H * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  // พื้นขาว
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
  // แถบเขียวบางๆ ด้านบน (ตกแต่ง)
  ctx.fillStyle = '#00B900'; ctx.fillRect(0, 0, W, 8);

  // ลูกค้า (ตัวใหญ่ ดำ)
  ctx.fillStyle = '#222'; ctx.font = 'bold 19px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('ลูกค้า: ' + result.customerName, 16, 38);
  // วันที่ (เล็ก เทา)
  ctx.fillStyle = '#888'; ctx.font = '13px sans-serif';
  ctx.fillText('วันที่ ' + now, 16, 58);
  // เส้นคั่นใต้หัว
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(16, 68); ctx.lineTo(W-16, 68); ctx.stroke();

  let y = HEAD_H + 24;
  rows.forEach(row => {
    ctx.fillStyle = row.found ? '#333' : '#e53935';
    ctx.font = '13px sans-serif'; ctx.textAlign = 'left';
    let name = row.name;
    if (ctx.measureText(name).width > 230) {
      while (ctx.measureText(name + '...').width > 230) name = name.slice(0, -1);
      name += '...';
    }
    ctx.fillText(name, 16, y);
    ctx.fillStyle = '#888'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(row.calc, W/2, y);
    ctx.fillStyle = '#00B900'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(row.total + ' บ.', W-16, y);
    y += ROW_H;
    ctx.strokeStyle = '#f5f5f5'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(16, y-8); ctx.lineTo(W-16, y-8); ctx.stroke();
  });

  y += 8;
  ctx.strokeStyle = '#00B900'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(16, y); ctx.lineTo(W-16, y); ctx.stroke();
  y += 26;
  ctx.fillStyle = '#333'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('ยอดรวมทั้งสิ้น', 16, y);
  ctx.fillStyle = '#00B900'; ctx.font = 'bold 19px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(result.grandTotal + ' บาท', W-16, y);

  return canvas.toDataURL('image/png');
}

// ==================== ส่งเข้า LINE ====================
async function submitOrder() {
  if (!lastResult) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังสร้างรูป...';

  try {
    let imageUrl = null;
    try {
      const imageBase64 = generateBillImage(lastResult);
      btn.textContent = '⏳ กำลังอัพโหลดรูป...';
      const base64Data = imageBase64.replace('data:image/png;base64,', '');
      const formData   = new FormData();
      formData.append('key', '323f3ae0cacf9ccb4711ef15746f14f5');
      formData.append('image', base64Data);
      formData.append('name', 'bill_' + lastResult.customerName + '_' + Date.now());
      const imgRes  = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
      const imgData = await imgRes.json();
      if (imgData.success) imageUrl = imgData.data.url;
    } catch(e) { console.log('image error:', e); }

    btn.textContent = '⏳ กำลังส่ง...';
    // DEBUG: ไม่ใช้ no-cors เพื่อดู response จริง
    const sendRes = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'sendImageAndSave',
        userId: userProfile.userId,
        customerName: lastResult.customerName,
        items: lastResult.items,
        itemsWithLabel: lastResult.items,
        grandTotal: lastResult.grandTotal,
        imageUrl: imageUrl
      })
    });
    const sendData = await sendRes.json();
    alert('DEBUG response: ' + JSON.stringify(sendData));

    alert('✅ ส่งรายการเรียบร้อยแล้วครับ!\nรอรับรูปและลิงก์ PDF ใน LINE สักครู่ครับ');
    liff.closeWindow();
  } catch(err) {
    alert('❌ ส่งไม่ได้: ' + err.message);
  }

  btn.disabled = false;
  btn.textContent = '✅ ยืนยันและส่ง LINE';
}
